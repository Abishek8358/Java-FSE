<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greeting Banner</title>
    <style>
        #headerBanner {
            background-color: blue;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .marked {
            background-color: yellow;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="headerBanner">
        <h1>Welcome User!</h1>
        <p>
            Enjoy our
            <span style="color:red; font-weight:bold;">
                Special Offer
            </span>
        </p>
        <p class="marked">
            Register today for exciting events!
        </p>
    </div>
</body>
</html>
