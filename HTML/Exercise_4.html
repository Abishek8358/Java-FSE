<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Photo Gallery</title>
    <style>
        .photo-box {
            border: 2px solid black;
            padding: 5px;
        }
        img {
            width: 200px;
            height: 150px;
        }
    </style>
</head>
<body>
    <div style="text-align:center;">
        <h2>Community Event Gallery</h2>
        <table border="1">
            <tr>
                <td class="photo-box">
                    <img src="event1.jpg" alt="Music Event" title="Music Event">
                    <p>Music Festival</p>
                </td>
                <td class="photo-box">
                    <img src="event2.jpg" alt="Food Event" title="Food Event">
                    <p>Food Carnival</p>
                </td>
                <td class="photo-box">
                    <img src="event3.jpg" alt="Sports Event" title="Sports Event">
                    <p>Sports Day</p>
                </td>
            </tr>
            <tr>
                <td class="photo-box">
                    <img src="event4.jpg" alt="Dance Event" title="Dance Event">
                    <p>Dance Competition</p>
                </td>
                <td class="photo-box">
                    <img src="event5.jpg" alt="Art Event" title="Art Event">
                    <p>Art Exhibition</p>
                </td>
                <td class="photo-box">
                    <img src="event6.jpg" alt="Book Fair" title="Book Fair">
                    <p>Book Fair</p>
                </td>
            </tr>
        </table>
    </div>
</body>
</html>
