<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign-Up Form</title>
    <style>
        .signup-form {
            width: 300px;
            margin: auto;
            padding: 20px;
            border: 2px solid black;
        }
        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h2 style="text-align:center;">Event Registration</h2>
    <form class="signup-form" onsubmit="displaySuccess(); return false;">
        <input type="text" placeholder="Enter Name" required autofocus>
        <input type="email" placeholder="Enter Email" required>
        <input type="date" required>
        <select required>
            <option>Select Event</option>
            <option>Music</option>
            <option>Sports</option>
        </select>
        <textarea placeholder="Enter Message"></textarea>
        <button type="submit">Register</button>
        <output id="msg"></output>
    </form>
    <script>
        function displaySuccess() {
            document.getElementById("msg").innerHTML = "Registration Successful!";
        }
    </script>
</body>
</html>
